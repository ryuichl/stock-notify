name: 台股 200MA Check

on:
  schedule:
    # 台股收盤後 (台灣 14:00 = UTC 06:00)
    # 週一到週五
    - cron: "0 6 * * 1-5"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check TW stocks vs 200MA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python check_ma200.py tw
