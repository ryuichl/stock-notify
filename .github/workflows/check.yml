name: 美股 200MA Check

on:
  schedule:
    # 美股收盤後 (美東 16:30 = UTC 21:30 = 台灣 05:30)
    # 週一到週五
    - cron: "30 21 * * 1-5"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check US stocks vs 200MA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python check_ma200.py us
